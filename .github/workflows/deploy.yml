name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/my-farm-advisor
            GIT_SSH_COMMAND="ssh -i /root/.ssh/github_actions" git pull origin main
            docker compose -f docker-compose.coolify.yml down || true
            docker compose -f docker-compose.coolify.yml up -d --build
            docker logs --tail 30 $(docker ps -q --filter name=openclaw-gateway) || true
